name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_DIR: ${{ secrets.DEPLOY_PATH }}
  SHARED_DIR: ${{ secrets.DEPLOY_PATH }}/shared

jobs:
  test:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: sfi_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql, zip, gd, bcmath, pdo_mysql
          coverage: none

      - name: Create .env for testing
        run: |
          cp .env.example .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=sfi_testing/' .env

      - name: Install Composer Dependencies
        run: composer install --no-interaction

      - name: Generate app key
        run: php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build NPM Assets
        run: |
          npm ci
          npm run build

      - name: Run migrations
        run: php artisan migrate

      - name: Run Tests
        run: php artisan test

  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql, zip, gd, bcmath, pdo_mysql
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

      - name: Post-install scripts
        run: php artisan package:discover --ansi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build NPM Assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy with rsync
        run: |
          RELEASE_DIR="${DEPLOY_DIR}/releases/$(date +%Y%m%d%H%M%S)"

          # Create release directory
          ssh -p ${{ secrets.SSH_PORT || '65002' }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ${RELEASE_DIR} ${SHARED_DIR}"

          # Rsync code to release directory (exclude storage and env)
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT || '65002' }} -o StrictHostKeyChecking=no" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='public/storage' \
            --exclude='storage/' \
            --exclude='.idea/' \
            --exclude='.vscode/' \
            --exclude='tests/' \
            --exclude='phpunit.xml' \
            --exclude='.phpunit.result.cache' \
            --delete \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${RELEASE_DIR}

          # Symlink shared storage and .env into release
          ssh -p ${{ secrets.SSH_PORT || '65002' }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${RELEASE_DIR} && \
             ln -sfn ${SHARED_DIR}/.env .env && \
             rm -rf storage && \
             ln -sfn ${SHARED_DIR}/storage storage && \
             rm -rf public/storage && \
             ln -sfn ${SHARED_DIR}/storage/app/public public/storage && \
             php artisan migrate --force && \
             php artisan route:cache && \
             php artisan config:cache && \
             php artisan view:cache && \
             php artisan event:cache && \
             chmod -R 775 storage bootstrap/cache && \
             ln -sfn ${RELEASE_DIR} ${DEPLOY_DIR}/current"

      - name: Cleanup old releases (keep last 5)
        run: |
          ssh -p ${{ secrets.SSH_PORT || '65002' }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${DEPLOY_DIR}/releases && ls -t | tail -n +6 | xargs -r rm -rf"
